<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Preparing Your Journey</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
color:white;
overflow:hidden;
}

/* Background Image */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://images.unsplash.com/photo-1557804506-669a67965ba0");
background-size:cover;
background-position:center;
animation:zoom 12s infinite alternate;
z-index:-2;
}

/* Dark overlay to match your theme */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(11,37,69,0.75);
z-index:-1;
}

/* Zoom animation for image */

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* Content box */

.content{
text-align:center;
max-width:500px;
}

.title{
font-size:28px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
font-size:16px;
color:#d1d9e0;
margin-bottom:30px;
}

/* Progress bar */

.loading-bar{
height:6px;
background:#2c4a70;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#f0b429;
animation:load 3s forwards;
}

@keyframes load{
from{width:0;}
to{width:100%;}
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="content">

<div class="title">Sharpening Skills. Unlocking Futures.</div>

<div class="subtitle">
Preparing your path to the next big opportunity...
</div>

<div class="loading-bar">
<div class="progress"></div>
</div>

</div>

<script>

setTimeout(function(){
window.location.href="signin.html";
},3000);

</script>

</body>
</html>
