<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep · Crack your dream job</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0e1e2f;
        }

        /* background layer – you can replace .page-bg with your own image later */
        .page-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1600&q=80");
              background-size: cover;
            background-position: center 40%;
            background-repeat: no-repeat;
            filter: brightness(0.55) contrast(1.1) saturate(1.2);
            z-index: -2;             
        }

        .soft-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----- NAVIGATION (top bar) ----- */
        .navbar {
            background-color: rgba(8, 22, 40, 0.92);
            backdrop-filter: blur(10px);
            color: white;
            padding: 0.9rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid #2d4b6e;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .brand-main {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 5px #00000050;
        }
        .brand-main span {
            color: #fdbb4c;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.8rem;
            align-items: center;
            font-weight: 500;
        }
        .nav-links a {
            color: #e2ebff;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
        }
        .nav-links a:hover {
            border-bottom-color: #ffaa33;
            color: white;
        }
        .nav-links .profile-link {
            background: rgba(255, 200, 80, 0.18);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #ffb347;
            margin-left: 0.5rem;
        }
        .nav-links .profile-link i {
            margin-right: 5px;
        }

        /* ----- MAIN HERO with transparent blue card ----- */
        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
        }

        /* semi‑transparent blue card */
        .hero-card {
            background: rgba(18, 40, 70, 0.75);      /* transparent blue */
            backdrop-filter: blur(12px);
            width: 800px;
            max-width: 100%;
            padding: 3.2rem 2.8rem;
            border-radius: 70px;
            box-shadow: 0 40px 70px rgba(0, 10, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.25);
            text-align: center;
            color: white;
        }

        .hero-card h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #ffffff, #ffe3b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .tagline {
            font-size: 2rem;
            font-weight: 600;
            color: #ffeca2;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 5px #00000050;
        }

        .description {
            font-size: 1.3rem;
            color: #cfdefa;
            margin-bottom: 2.2rem;
            border-bottom: 2px dashed rgba(255,215,140,0.5);
            padding-bottom: 1.5rem;
            display: inline-block;
        }

        /* start exploring button (attractive) */
        .explore-btn {
            background: linear-gradient(135deg, #1f3f62, #12304b);
            color: white;
            border: none;
            padding: 1.2rem 3.5rem;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px #0e1f32;
            transition: 0.2s;
            border: 1px solid #ffc1073a;
            display: inline-block;
            text-decoration: none;
        }
        .explore-btn i {
            margin-left: 12px;
            font-size: 1.9rem;
            vertical-align: middle;
        }
        .explore-btn:hover {
            background: linear-gradient(135deg, #29568a, #1a3f64);
            transform: scale(1.02);
            box-shadow: 0 25px 35px -6px #091725;
        }

        /* ----- FOOTER (unchanged) ----- */
        .footer {
            background: rgba(6, 16, 28, 0.9);
            backdrop-filter: blur(6px);
            color: #b6c9e5;
            padding: 1.5rem 3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #253c57;
            font-size: 0.95rem;
        }
        .footer-links {
            display: flex;
            gap: 2rem;
        }
        .footer-links a {
            color: #c9d9fc;
            text-decoration: none;
        }
        .footer-links a:hover {
            color: white;
            text-decoration: underline;
        }
        .footer-copy {
            color: #9bb1d1;
        }

        /* responsive */
        @media (max-width: 700px) {
            .navbar {
                padding: 1rem 1.5rem;
                
                            }
            .hero-card {
                padding: 2rem 1.5rem;
                border-radius: 40px;
            }
            .hero-card h1 {
                font-size: 2.8rem;
            }
            .tagline {
                font-size: 1.6rem;
            }
            .explore-btn {
                font-size: 1.4rem;
                padding: 1rem 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- background layers (you can replace page-bg with your own image) -->
    <div class="page-bg"></div>
    <div class="soft-grid"></div>

    <div class="wrapper">
        <!-- top navigation (exactly as second image + profile) -->
        <nav class="navbar">
            <div class="logo-area">
                <div class="brand-main">Placement<span>Prep</span></div>
            </div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Aptitude</a>
                <a href="#">Mock Tests</a>
                <a href="#">Technical MCQ</a>
                <a href="#">Company-wise</a>
                <!-- profile extra at the end -->
                <a href="#" class="profile-link"><i class="fas fa-user-circle"></i> Profile</a>
            </div>
        </nav>

        <!-- main hero area with transparent blue card, navigation row REMOVED -->
        <div class="hero-section">
            <div class="hero-card">
                <h1>PlacementPrep</h1>
                <div class="tagline"><i class="fas fa-bullseye" style="color:#fabe5a;"></i> Crack Your Dream Job</div>
                <div class="description">Complete Placement Preparation Portal</div>

                <!-- START EXPLORING button – the only content below the description (aside from card background) -->
                <a href="load.html" class="explore-btn">START EXPLORING <i class="fas fa-arrow-right"></i></a>

                <!-- the extra navigation row (Home | About Us | ... ) has been removed as requested -->
            </div>
        </div>

        <!-- footer -->
        <footer class="footer">
            <div class="footer-copy">
                <i class="far fa-copyright"></i> 2025 PlacementPrep · Complete Placement Portal
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </footer>
    </div>
</body>
</html>
