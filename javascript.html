<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JS Mastery | Modern JavaScript Concepts</title>
    <!-- Font Awesome 6 (free icons for visual enhancement) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1f33 0%, #0f2c46 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        /* ---------- glass & utility ---------- */
        .glass-card {
            background: rgba(31, 58, 86, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.7);
        }

        /* ---------- sticky navbar (exactly as provided) ---------- */
        .navbar {
            background-color: #0a1f33;
            padding: 0.8rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #1f3e5c;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span:first-child {
            color: white;
        }
        .logo span:last-child {
            color: #f5b942;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
            font-weight: 500;
        }
        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.2s;
            position: relative;
            padding: 0.3rem 0;
        }
        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: #f5b942;
            transition: width 0.2s ease;
        }
        .nav-menu a:hover::after {
            width: 100%;
        }
        .nav-menu a:hover {
            text-shadow: 0 0 6px #f2c46d;
            color: #ffffff;
        }

        .profile-btn {
            background: transparent;
            border: 1.5px solid rgba(245, 185, 66, 0.5);
            border-radius: 40px;
            padding: 0.45rem 1.5rem 0.45rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: default;
            background-color: rgba(10, 31, 51, 0.8);
            text-decoration: none;
        }
        .profile-btn i {
            color: #f5b942;
            font-size: 1.1rem;

        }
        .profile-btn:hover {
            border-color: #f5b942;
            box-shadow: 0 0 15px #f5b94266;
            background: #1f3a56;
            transform: scale(1.02);
            text-decoration: none;
        }

        /* ---------- hero heading (modern, clean) ---------- */
        .hero-section {
            text-align: center;
            margin: 2.5rem 0 1rem 0;
            padding: 0 1rem;
        }
        .hero-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f5b942);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .hero-section p {
            color: #cbdbe6;
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }
        .gold-divider {
            width: 100px;
            height: 3px;
            background: #f5b942;
            margin: 0.8rem auto 1.8rem auto;
            border-radius: 4px;
            box-shadow: 0 0 8px #f5b942aa;
        }

        /* ---------- RESPONSIVE CARDS GRID (clean, centered) ---------- */
        .cards-grid {
            max-width: 1400px;
            margin: 0 auto 4rem auto;
            padding: 1.5rem 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.8rem;
        }

        /* ----- CARD STYLES: rounded corners, soft shadow, centered text ----- */
        .js-card {
            background: rgba(25, 55, 80, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.7rem 1rem;
            text-align: center;
            box-shadow: 0 18px 32px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            /* fade-in + slide up animation on load */
            opacity: 0;
            transform: translateY(28px);
            animation: fadeSlideUp 0.55s forwards ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
        }

        /* staggered fade-in for smooth loading (10 topics) */
        .js-card:nth-child(1) { animation-delay: 0.03s; }
        .js-card:nth-child(2) { animation-delay: 0.07s; }
        .js-card:nth-child(3) { animation-delay: 0.11s; }
        .js-card:nth-child(4) { animation-delay: 0.15s; }
        .js-card:nth-child(5) { animation-delay: 0.19s; }
        .js-card:nth-child(6) { animation-delay: 0.23s; }
        .js-card:nth-child(7) { animation-delay: 0.27s; }
        .js-card:nth-child(8) { animation-delay: 0.31s; }
        .js-card:nth-child(9) { animation-delay: 0.35s; }
        .js-card:nth-child(10) { animation-delay: 0.39s; }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(28px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- HOVER EFFECT: scale up + deeper shadow + smooth transition (0.35s) ----- */
        .js-card:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(42, 78, 110, 0.8);
            backdrop-filter: blur(14px);
            box-shadow: 0 32px 48px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(245, 185, 66, 0.3), 0 0 28px rgba(245, 185, 66, 0.25);
            border-color: rgba(245, 185, 66, 0.45);
        }

        /* card inner elements */
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 0.9rem;
            transition: transform 0.2s ease;
        }
        .js-card:hover .card-icon {
            transform: scale(1.08);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #ffffff;
            margin-bottom: 0.5rem;
            word-break: break-word;
            line-height: 1.3;
        }
        .card-badge {
            font-size: 0.68rem;
            background: rgba(245, 185, 66, 0.2);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
            color: #f5cd8a;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* footer (exactly matching given structure) */
        .footer {
            background-color: #0a1f33;
            padding: 1.8rem 2.5rem;
            margin-top: auto;
            border-top: 1px solid #1f3e5c;
            color: #cbd5e1;
        }
        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .footer-copy {
            font-size: 1rem;
            color: #cbd5e1;
        }
        .footer-copy strong {
            color: white;
            font-weight: 600;
        }
        .footer-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .footer-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
        }
        .footer-links a:hover {
            color: #f5b942;
        }
        .social-icons {
            display: flex;
            gap: 1.5rem;
            font-size: 1.3rem;
        }
        .social-icons a {
            color: #cbd5e1;
            transition: 0.2s;
        }
        .social-icons a:hover {
            color: #f5b942;
            transform: translateY(-3px);
        }

        /* responsive adjustments */
        @media (max-width: 900px) {
            .navbar { padding: 0.8rem 1.5rem; }
            .nav-menu { gap: 1rem; }
            .hero-section h1 { font-size: 2.2rem; }
            .cards-grid { padding: 1rem 1.5rem; gap: 1.5rem; }
        }
        @media (max-width: 700px) {
            .nav-menu { order: 3; width: 100%; margin-top: 0.8rem; justify-content: center; }
            .profile-btn { margin-left: auto; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.2rem; }
            .card-title { font-size: 1.05rem; }
            .js-card { min-height: 150px; padding: 1.4rem 0.8rem; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); padding: 0.8rem; }
            .js-card { padding: 1.2rem 0.6rem; min-height: 140px; }
            .card-icon { font-size: 2rem; }
            .card-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- ========== EXACT NAVBAR (PROVIDED - no changes) ========== -->
    <nav class="navbar">
        <div class="logo">
            <span>Placement</span><span>Prep</span>
        </div>
         <div class="nav-menu">
           <a href="home.html">Home</a>
                <a href="aboutus.html">About Us</a>
                <a href="apptitude.html">Aptitude</a>
                <a href="mocktest.html">Mock Tests</a>
                <a href="technical.html">Technical MCQ</a>
                <a href="companywise.html">Company-wise</a>
                <a href="interview.html">Interview preparations</a>
        </div>
       <a href="profile.html" class="profile-btn">
    <i class="fas fa-user-circle"></i> Profile
</a>
    </nav>

    <!-- Hero section with title and description -->
    <div class="hero-section">
        <h1>⚡ Modern JavaScript</h1>
        <div class="gold-divider"></div>
        <p>Master ES6+ features, DOM manipulation, async patterns & more</p>
    </div>

    <!-- Grid container for dynamic topic cards -->
    <div class="cards-grid" id="jsGrid"></div>

    <!-- Footer (exactly matching the given style) -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-copy">
                © 2025 <strong>PlacementPrep</strong> — JavaScript Essentials
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
            <div class="social-icons">
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // --------------------------------------------------------------
        // COMPLETE LIST OF JAVASCRIPT TOPICS (exactly as required)
        // --------------------------------------------------------------
        const jsTopics = [
            "Variables & Data Types (var, let, const)",
            "Functions (normal, arrow)",
            "DOM Manipulation",
            "Events & Event Listeners",
            "Arrays & Objects",
            "String & Array Methods",
            "Promises & Async/Await",
            "JSON Handling",
            "Fetch API (AJAX Basics)",
            "ES6+ Features"
        ];

        // Helper: map each topic to a meaningful FontAwesome icon
        function getTopicIcon(topic) {
            const lower = topic.toLowerCase();
            if (lower.includes("variable") || lower.includes("data type")) return "fa-code";
            if (lower.includes("function")) return "fa-cogs";
            if (lower.includes("dom manipulation")) return "fa-window-maximize";
            if (lower.includes("event") && lower.includes("listener")) return "fa-bolt";
            if (lower.includes("array") || lower.includes("object")) return "fa-layer-group";
            if (lower.includes("string") || lower.includes("method")) return "fa-font";
            if (lower.includes("promise") || lower.includes("async") || lower.includes("await")) return "fa-clock";
            if (lower.includes("json")) return "fa-brackets-curly";
            if (lower.includes("fetch") || lower.includes("ajax")) return "fa-cloud-download-alt";
            if (lower.includes("es6") || lower.includes("feature")) return "fa-star";
            return "fa-js";
        }

        // Generate a short, helpful description for each JavaScript concept
        function getShortDescription(topic) {
            const descriptions = {
                "Variables & Data Types (var, let, const)": "let, const, var, scope",
                "Functions (normal, arrow)": "declarations & expressions",
                "DOM Manipulation": "Select, modify elements",
                "Events & Event Listeners": "click, submit, keyup",
                "Arrays & Objects": "Data structures",
                "String & Array Methods": "map, filter, reduce, split",
                "Promises & Async/Await": "Handle async code",
                "JSON Handling": "parse, stringify",
                "Fetch API (AJAX Basics)": "HTTP requests",
                "ES6+ Features": "Destructuring, spread, modules"
            };
            return descriptions[topic] || "Modern JS concept";
        }

        // Get the grid container and dynamically generate cards
        const gridContainer = document.getElementById('jsGrid');
        if (gridContainer) {
            jsTopics.forEach(topic => {
                // Create card element
                const card = document.createElement('div');
                card.className = 'js-card';
                
                // Icon element with JavaScript yellow/gold theme
                const iconDiv = document.createElement('div');
                iconDiv.className = 'card-icon';
                const iconClass = getTopicIcon(topic);
                // Use vibrant JS yellow-gold color
                iconDiv.innerHTML = `<i class="fab ${iconClass}" style="color: #f5b942; text-shadow: 0 2px 8px rgba(0,0,0,0.3);"></i>`;
                // Fallback for non-brand icons (some are 'fas')
                if (!iconClass.startsWith('fa-js') && iconClass !== 'fa-js') {
                    iconDiv.innerHTML = `<i class="fas ${iconClass}" style="color: #f5b942; font-size: 2.5rem;"></i>`;
                }
                
                // Title element (topic name)
                const titleElem = document.createElement('div');
                titleElem.className = 'card-title';
                titleElem.textContent = topic;
                
                // Badge (short description)
                const badgeSpan = document.createElement('div');
                badgeSpan.className = 'card-badge';
                badgeSpan.innerHTML = `<i class="fas fa-crown" style="font-size: 0.65rem; margin-right: 6px;"></i> ${getShortDescription(topic)}`;
                
                // Assemble card
                card.appendChild(iconDiv);
                card.appendChild(titleElem);
                card.appendChild(badgeSpan);
                
                // Interactive click feedback (console log for demonstration)
                card.addEventListener('click', () => {
                    console.log(`⚡ Exploring: ${topic} — ${getShortDescription(topic)}`);
                    // You can extend this to show practice modules or navigate
                });
                
                gridContainer.appendChild(card);
            });
        }

        // Small additional style for active click effect (polish)
        const activeStyle = document.createElement('style');
        activeStyle.textContent = `
            .js-card:active {
                transform: scale(0.97);
                transition: transform 0.1s ease;
            }
        `;
        document.head.appendChild(activeStyle);
    </script>
</body>
</html>
